syntax = "proto3";
package dkv.raft;

// ============ Raft 日志条目 ============
message LogEntry {
    uint64 term = 1;
    uint64 index = 2;
    bytes command = 3;  // 序列化的 KV 操作
}

// ============ RequestVote ============
message RequestVoteRequest {
    uint64 term = 1;
    uint64 candidate_id = 2;
    uint64 last_log_index = 3;
    uint64 last_log_term = 4;
}

message RequestVoteResponse {
    uint64 term = 1;
    bool vote_granted = 2;
}

// ============ AppendEntries ============
message AppendEntriesRequest {
    uint64 term = 1;
    uint64 leader_id = 2;
    uint64 prev_log_index = 3;
    uint64 prev_log_term = 4;
    uint64 leader_commit = 5;
    repeated LogEntry entries = 6;
}

message AppendEntriesResponse {
    uint64 term = 1;
    bool success = 2;
    uint64 match_index = 3;
}

// ============ InstallSnapshot (简化版) ============
message InstallSnapshotRequest {
    uint64 term = 1;
    uint64 leader_id = 2;
    uint64 last_included_index = 3;
    uint64 last_included_term = 4;
    bytes data = 5;  // RocksDB snapshot 数据
}

message InstallSnapshotResponse {
    uint64 term = 1;
    bool success = 2;
}

// ============ Raft RPC 包裹 ============
message RaftMessage {
    enum Type {
        REQUEST_VOTE = 0;
        REQUEST_VOTE_RESP = 1;
        APPEND_ENTRIES = 2;
        APPEND_ENTRIES_RESP = 3;
        INSTALL_SNAPSHOT = 4;
        INSTALL_SNAPSHOT_RESP = 5;
    }
    Type type = 1;
    RequestVoteRequest request_vote = 10;
    RequestVoteResponse request_vote_resp = 11;
    AppendEntriesRequest append_entries = 12;
    AppendEntriesResponse append_entries_resp = 13;
    InstallSnapshotRequest install_snapshot = 14;
    InstallSnapshotResponse install_snapshot_resp = 15;
}
