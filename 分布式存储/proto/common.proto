syntax = "proto3";
package dkv.common;

enum ErrorCode {
    OK = 0;
    KEY_NOT_FOUND = 1;
    WRONG_LEADER = 2;
    SHARD_NOT_FOUND = 3;
    TIMEOUT = 4;
    NOT_LEADER = 5;
    INTERNAL_ERROR = 6;
}

message NodeInfo {
    uint64 node_id = 1;
    string ip = 2;
    uint32 port = 3;
    uint32 shard_count = 4;
    uint32 leader_count = 5;
}

message ShardMeta {
    uint64 shard_id = 1;
    bytes start_key = 2;
    bytes end_key = 3;
    uint64 epoch = 4;
    uint64 leader_node_id = 5;
    repeated uint64 peer_node_ids = 6;
}

message ShardMap {
    repeated ShardMeta shards = 1;
    uint64 version = 2;
}
