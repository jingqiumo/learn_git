syntax = "proto3";
package dkv.pd;

import "common.proto";

message RegisterNodeRequest {
    common.NodeInfo node = 1;
}

message RegisterNodeResponse {
    common.ErrorCode error_code = 1;
    uint64 assigned_node_id = 2;
}

message HeartbeatRequest {
    uint64 node_id = 1;
    common.NodeInfo node_stats = 2;
    message ShardState {
        uint64 shard_id = 1;
        uint64 term = 2;
        uint64 committed_index = 3;
        uint64 applied_index = 4;
        bool is_leader = 5;
    }
    repeated ShardState shard_states = 3;
}

message HeartbeatResponse {
    common.ErrorCode error_code = 1;
    message ShardCommand {
        enum Action {
            NO_OP = 0;
            ADD_REPLICA = 1;
            REMOVE_REPLICA = 2;
            TRANSFER_LEADER = 3;
        }
        Action action = 1;
        uint64 shard_id = 2;
        repeated uint64 peer_node_ids = 3;
        uint64 new_leader_node_id = 4;
    }
    repeated ShardCommand commands = 2;
}

message GetShardMapRequest {}

message GetShardMapResponse {
    common.ErrorCode error_code = 1;
    common.ShardMap shard_map = 2;
}
